<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thanks — AppDepot LLC</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="assets/css/styles.css" />
<style>
  .ty{min-height:78vh;display:grid;place-items:center;text-align:center;padding:60px 24px}
  .ty .mark{width:64px;height:64px;border-radius:16px;background:var(--grad);display:grid;place-items:center;color:#fff;font-size:30px;margin:0 auto 22px}
  .ty h1{font-size:clamp(28px,4vw,40px);letter-spacing:-.02em;color:var(--ink)}
  .ty p{color:#55607a;font-size:18px;margin:12px 0 26px;max-width:520px}
</style>
</head>
<body>
<main class="ty">
  <div>
    <div class="mark" aria-hidden="true">✓</div>
    <h1>Thanks — we got your message.</h1>
    <p>We'll get back to you within one business day. In the meantime, feel free to explore what we build.</p>
    <a href="/" class="btn btn--primary btn--lg">Back to home</a>
  </div>
</main>
</body>
</html>
